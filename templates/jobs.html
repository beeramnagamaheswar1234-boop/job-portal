<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="navbar">
    <h2>Chance.in</h2>

    <div>
        <span>{{ user }} 👤</span>
        <a href="/jobs">Jobs</a>
        <a href="/profile">Profile</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="main-container">

    <h1 class="title">Available Jobs</h1>

    <div class="job-container">
    {% for job in jobs %}
        <div class="job-card">
            <img src="{{ job.image }}" class="job-img">

            <h3>{{ job.title }}</h3>
            <p><b>{{ job.company }}</b> - {{ job.location }}</p>

            <p>{{ job.description }}</p>

            <a href="/apply/{{ job.title }}" class="apply-btn">Apply</a>
        </div>
    {% endfor %}
    </div>

</div>
